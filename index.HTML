<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Monitoring Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #f3f4f6; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-blue-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold tracking-wide">📊 MONITORING DATA PRESENSI</h1>
        <p class="text-blue-200 text-sm mt-1">Sistem Laporan Real-Time Bubugao</p>
      </div>
      
      <div class="flex items-center gap-2 bg-blue-800 p-2 rounded-xl border border-blue-700">
        <label class="text-sm font-semibold whitespace-nowrap">Filter Data:</label>
        <select id="filterDropdown" class="bg-white text-gray-800 rounded-lg px-3 py-1.5 text-sm font-medium outline-none cursor-pointer w-44">
          </select>
      </div>
    </div>

    <div class="overflow-x-auto p-6">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr id="tableHeader" class="border-b-2 border-gray-200 text-gray-600 text-sm font-bold uppercase tracking-wider">
            </tr>
        </thead>
        <tbody id="tableBody" class="text-gray-700 text-sm divide-y divide-gray-100">
          <tr>
            <td colspan="7" class="text-center py-10 text-gray-400 font-medium animate-pulse">⏳ Sedang menarik data presensi...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // 💡 URL Baru Anda + Pengaktif Fitur Keluarannya (?action=kehadiran)
    const API_URL = "https://script.google.com/macros/s/AKfycbx2PBgvgwQ21LuIoOpx8VQcEi6GsycKi2JCvx0CBIDwqRqJK80xuY5eq_sdoAjWqDLk2Q/exec?action=kehadiran"; 
    
    // Filter berdasarkan kolom ke-7 (Index 6 = Kolom G di Google Sheets Anda)
    const KOLOM_FILTER = 6; 
    let masterRows = [];

    async function ambilData() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Koneksi gagal atau terblokir kebijakan Google");
        
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        if (data.length === 0) throw new Error("Data di sheet KEHADIRAN kosong");
        
        const headers = data[0]; 
        masterRows = data.slice(1);  
        
        // 1. Buat Header Tabel Otomatis
        document.getElementById('tableHeader').innerHTML = headers.map(h => `<th class="py-3 px-4">${h}</th>`).join('');
        
        // 2. Ambil Data Unik untuk Dropdown
        const kategoriUnik = [...new Set(masterRows.map(r => r[KOLOM_FILTER]))].filter(k => k !== undefined && k !== "");
        
        const dropdown = document.getElementById('filterDropdown');
        dropdown.innerHTML = ""; 
        
        kategoriUnik.forEach(kat => {
          dropdown.innerHTML += `<option value="${kat}">${kat}</option>`;
        });

        // 3. Wajib Terpilih Tepat 1 Data Sejak Awal Dimuat
        if (kategoriUnik.length > 0) {
          dropdown.value = kategoriUnik[0]; 
          const dataAwal = masterRows.filter(r => r[KOLOM_FILTER] === kategoriUnik[0]);
          tampilkanTabel(dataAwal);
        } else {
          tampilkanTabel([]);
        }

        // 4. Logika Filter Dropdown
        dropdown.addEventListener('change', function() {
          const pilihan = this.value;
          const dataFilter = masterRows.filter(r => r[KOLOM_FILTER] === pilihan);
          tampilkanTabel(dataFilter);
        });

      } catch (error) {
        document.getElementById('tableBody').innerHTML = `
          <tr>
            <td colspan="7" class="text-center py-10 text-red-500 font-bold">
              ❌ Gagal memuat data: ${error.message}<br>
              <span class="text-xs text-gray-400 font-normal">Periksa kembali apakah nama Sheet Anda sudah tepat ditulis "KEHADIRAN" (Huruf Kapital Semua).</span>
            </td>
          </tr>`;
      }
    }

    function tampilkanTabel(dataBaris) {
      const tbody = document.getElementById('tableBody');
      if (dataBaris.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-400">Tidak ada data untuk pilihan ini.</td></tr>`;
        return;
      }
      
      tbody.innerHTML = dataBaris.map(row => {
        const columns = row.map(cell => `<td class="py-3 px-4">${cell}</td>`).join('');
        return `<tr class="hover:bg-gray-50 transition-colors border-b border-gray-100">${columns}</tr>`;
      }).join('');
    }

    // Jalankan sistem
    ambilData();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Laporan Realtime</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style> body { background-color: #f3f4f6; } </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-blue-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold tracking-wide">📋 LAPORAN UTAMA</h1>
        <p class="text-blue-200 text-sm mt-1">
          Presensi BU BU GAO • 
          <span class="text-emerald-400 font-semibold animate-pulse">● Auto-Refresh Aktif</span>
          <!-- 💡 INDIKATOR VISUAL: Jam ini akan terus berdetak setiap kali data berhasil di-refresh -->
          <span id="refreshTime" class="block text-xs text-blue-300 mt-0.5 font-mono">Menghubungkan ke server...</span>
        </p>
      </div>
      
      <!-- Filter & Fitur Tarik Data -->
      <div class="flex flex-wrap items-center gap-3 bg-blue-800 p-2 rounded-xl border border-blue-700">
        <div class="flex items-center gap-2">
          <label class="text-sm font-semibold whitespace-nowrap">Filter Kolom F:</label>
          <select id="filterDropdown" class="bg-white text-gray-800 rounded-lg px-3 py-1.5 text-sm font-medium outline-none cursor-pointer w-44">
            <option>Memuat...</option>
          </select>
        </div>
        
        <!-- Tombol Tarik Data Hasil Filter -->
        <button id="downloadBtn" onclick="tarikDataHasilFilter()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 transition-all shadow-md cursor-pointer">
          📥 Tarik Data
        </button>
      </div>
    </div>

    <!-- Tabel Laporan -->
    <div class="overflow-x-auto p-6">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr id="tableHeader" class="border-b-2 border-gray-200 text-gray-600 text-sm font-bold uppercase tracking-wider"></tr>
        </thead>
        <tbody id="tableBody" class="text-gray-700 text-sm divide-y divide-gray-100">
          <tr>
            <td class="text-center py-10 text-gray-400 font-medium animate-pulse">⏳ Menarik data laporan...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx2PBgvgwQ21LuIoOpx8VQcEi6GsycKi2JCvx0CBIDwqRqJK80xuY5eq_sdoAjWqDLk2Q/exec?action=laporan"; 
    
    // Jeda waktu refresh otomatis (10000 milidetik = 10 detik)
    const REFRESH_INTERVAL = 10000; 

    let masterRows = [];
    let currentHeaders = [];
    let filterTerpilih = ""; // Variabel global untuk mengunci pilihan user agar tidak ter-reset

    async function ambilData(isInitial = false) {
      try {
        // 💡 PERBAIKAN 1: Tambahkan Cache-Buster menggunakan timestamp dinamis (?_t=angka) 
        // Ini memaksa browser untuk selalu meminta data paling baru dari server Google Sheets
        const urlDenganAntiCache = API_URL + "&_t=" + Date.now();

        const response = await fetch(urlDenganAntiCache);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        currentHeaders = data[0]; 
        masterRows = data.slice(1);  
        
        // Render nama judul kolom ke tabel
        document.getElementById('tableHeader').innerHTML = currentHeaders.map(h => `<th class="py-3 px-4">${h}</th>`).join('');
        
        // Ambil list kategori unik terbaru dari Kolom F
        const kategoriUnik = [...new Set(masterRows.map(r => r[0]))].filter(k => k !== undefined && k !== "");
        
        const dropdown = document.getElementById('filterDropdown');
        
        // Jika web baru pertama kali dibuka, default-kan ke kategori pertama
        if (isInitial && kategoriUnik.length > 0) {
          filterTerpilih = kategoriUnik[0];
        }

        // Susun ulang HTML opsi dropdown secara bersih
        dropdown.innerHTML = kategoriUnik.map(kat => `<option value="${kat}">${kat}</option>`).join('');

        // 💡 PERBAIKAN 2: Sistem pengunci filter absolut
        if (kategoriUnik.length > 0) {
          if (kategoriUnik.includes(filterTerpilih)) {
            dropdown.value = filterTerpilih; // Kunci pilihan user yang lama
          } else {
            filterTerpilih = kategoriUnik[0];
            dropdown.value = filterTerpilih;
          }
          tampilkanTabel(masterRows.filter(r => r[0] === filterTerpilih));
        } else {
          tampilkanTabel([]);
        }

        // 💡 PERBAIKAN 3: Update waktu refresh aktual di layar monitor agar terpantau aktif
        const skrg = new Date();
        const jam = String(skrg.getHours()).padStart(2, '0');
        const menit = String(skrg.getMinutes()).padStart(2, '0');
        const detik = String(skrg.getSeconds()).padStart(2, '0');
        document.getElementById('refreshTime').innerText = `Terakhir diperbarui: Pukul ${jam}:${menit}:${detik} WIB`;

      } catch (error) {
        console.error("Gagal memperbarui data:", error.message);
        document.getElementById('refreshTime').innerText = `⚠️ Koneksi terputus, mencoba ulang...`;
        if (isInitial) {
          document.getElementById('tableBody').innerHTML = `<tr><td class="text-center py-10 text-red-500 font-bold">❌ Gagal memuat data: ${error.message}</td></tr>`;
        }
      }
    }

    function tampilkanTabel(dataBaris) {
      const tbody = document.getElementById('tableBody');
      if (dataBaris.length === 0) {
        tbody.innerHTML = `<tr><td class="text-center py-10 text-gray-400">Tidak ada data untuk pilihan ini.</td></tr>`;
        return;
      }
      tbody.innerHTML = dataBaris.map(row => {
        return `<tr class="hover:bg-gray-50 border-b border-gray-100">${row.map(cell => `<td class="py-3 px-4">${cell}</td>`).join('')}</tr>`;
      }).join('');
    }

    // 📥 FUNGSI TARIK DATA (DOWNLOAD CSV HASIL DROPDOWN)
    function tarikDataHasilFilter() {
      if (!filterTerpilih || masterRows.length === 0) {
        alert("Data belum siap atau tidak tersedia untuk diunduh!");
        return;
      }

      const dataDisaring = masterRows.filter(r => r[0] === filterTerpilih);
      const kontenCSV = [currentHeaders, ...dataDisaring]
        .map(baris => baris.map(cell => `"${cell.toString().replace(/"/g, '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + kontenCSV], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `Laporan_${filterTerpilih.replace(/[^a-zA-Z0-9]/g, "_")}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Tangkap perubahan ketika user sengaja mengklik dropdown
    document.getElementById('filterDropdown').addEventListener('change', function() {
      filterTerpilih = this.value; // Amankan opsi pilihan baru ke variabel global
      tampilkanTabel(masterRows.filter(r => r[0] === filterTerpilih));
    });

    // Panggilan pertama saat halaman dibuka pertama kali
    ambilData(true);

    // 💡 PERBAIKAN 4: Menggunakan Antrean Timeout Berantai (Lebih aman dari setInterval)
    // Fungsi ini akan menjamin request berikutnya dikirim 10 detik SETELAH request sebelumnya sukses didownload.
    function mulaiSiklusAutoRefresh() {
      setTimeout(async () => {
        await ambilData(false); 
        mulaiSiklusAutoRefresh(); // Panggil dirinya sendiri untuk membuat loop abadi yang sehat
      }, REFRESH_INTERVAL);
    }

    // Aktifkan siklus loop otomatis
    mulaiSiklusAutoRefresh();
  </script>
</body>
</html>

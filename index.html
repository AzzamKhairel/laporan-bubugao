<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Laporan Realtime</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style> body { background-color: #f3f4f6; } </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-blue-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold tracking-wide">📋 LAPORAN UTAMA </h1>
        <p class="text-blue-200 text-sm mt-1">Presensi BU BU GAO  • <span class="text-emerald-400 font-semibold animate-pulse">● Auto-Refresh Aktif</span></p>
      </div>
      
      <div class="flex items-center gap-2 bg-blue-800 p-2 rounded-xl border border-blue-700">
        <label class="text-sm font-semibold whitespace-nowrap">Filter Kolom F:</label>
        <select id="filterDropdown" class="bg-white text-gray-800 rounded-lg px-3 py-1.5 text-sm font-medium outline-none cursor-pointer w-44">
          <option>Memuat...</option>
        </select>
      </div>
    </div>

    <div class="overflow-x-auto p-6">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr id="tableHeader" class="border-b-2 border-gray-200 text-gray-600 text-sm font-bold uppercase tracking-wider"></tr>
        </thead>
        <tbody id="tableBody" class="text-gray-700 text-sm divide-y divide-gray-100">
          <tr>
            <td class="text-center py-10 text-gray-400 font-medium animate-pulse">⏳ Menarik data laporan...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx2PBgvgwQ21LuIoOpx8VQcEi6GsycKi2JCvx0CBIDwqRqJK80xuY5eq_sdoAjWqDLk2Q/exec?action=laporan"; 
    
    // Waktu tunggu refresh otomatis (5000 milidetik = 5 detik)
    const REFRESH_INTERVAL = 5000; 

    let masterRows = [];

    // Ditambahkan parameter 'isInitial' untuk membedakan loading pertama kali vs refresh berkala
    async function ambilData(isInitial = false) {
      try {
        const dropdown = document.getElementById('filterDropdown');
        // 💡 KUNCI UTAMA: Simpan nilai yang sedang dipilih user sebelum data ditarik ulang
        const nilaiTerpilihSebelumnya = dropdown.value;

        const response = await fetch(API_URL);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        const headers = data[0]; 
        masterRows = data.slice(1);  
        
        // Buat nama-nama judul kolom
        document.getElementById('tableHeader').innerHTML = headers.map(h => `<th class="py-3 px-4">${h}</th>`).join('');
        
        // Ambil data unik dari Kolom F (Index ke-0 setelah dipotong backend)
        const kategoriUnik = [...new Set(masterRows.map(r => r[0]))].filter(k => k !== undefined && k !== "");
        
        // Bangun ulang opsi dropdown
        dropdown.innerHTML = ""; 
        kategoriUnik.forEach(kat => {
          dropdown.innerHTML += `<option value="${kat}">${kat}</option>`;
        });

        // Logika penentuan filter aktif setelah data diperbarui
        if (kategoriUnik.length > 0) {
          // Jika opsi yang lama masih ada di data baru dan ini bukan loading awal, kunci posisi dropdown
          if (kategoriUnik.includes(nilaiTerpilihSebelumnya) && !isInitial) {
            dropdown.value = nilaiTerpilihSebelumnya;
          } else {
            dropdown.value = kategoriUnik[0];
          }
          tampilkanTabel(masterRows.filter(r => r[0] === dropdown.value));
        } else {
          tampilkanTabel([]);
        }

      } catch (error) {
        console.error("Gagal memperbarui data:", error.message);
        // Hanya tampilkan pesan error besar di layar jika gagal pada saat pertama kali web dibuka
        if (isInitial) {
          document.getElementById('tableBody').innerHTML = `<tr><td class="text-center py-10 text-red-500 font-bold">❌ Gagal memuat data: ${error.message}</td></tr>`;
        }
      }
    }

    function tampilkanTabel(dataBaris) {
      const tbody = document.getElementById('tableBody');
      if (dataBaris.length === 0) {
        tbody.innerHTML = `<tr><td class="text-center py-10 text-gray-400">Tidak ada data untuk pilihan ini.</td></tr>`;
        return;
      }
      tbody.innerHTML = dataBaris.map(row => {
        return `<tr class="hover:bg-gray-50 border-b border-gray-100">${row.map(cell => `<td class="py-3 px-4">${cell}</td>`).join('')}</tr>`;
      }).join('');
    }

    // Jalankan penangkap event perpindahan dropdown (Cukup diinisialisasi 1x di luar fungsi)
    document.getElementById('filterDropdown').addEventListener('change', function() {
      tampilkanTabel(masterRows.filter(r => r[0] === this.value));
    });

    // Panggilan pertama saat halaman web baru dibuka
    ambilData(true);

    // 🔄 SISTEM AUTO REFRESH BERKALA
    setInterval(() => {
      ambilData(false); // Ambil data di latar belakang tanpa merusak kenyamanan klik user
    }, REFRESH_INTERVAL);
  </script>
</body>
</html>
